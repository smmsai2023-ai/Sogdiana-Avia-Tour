<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sogdiana Avia Tour</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Montserrat', sans-serif;
}

body {
  background: #f4f6f9;
  color: #0b1a5e;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(135deg, #0b1a5e, #1e90ff);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  flex-direction: column;
}

.hero h1 {
  font-size: 60px;
  font-weight: 800;
}

.hero p {
  margin-top: 15px;
  opacity: 0.8;
}

.btn {
  margin-top: 25px;
  padding: 14px 30px;
  background: #00a651;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  transition: 0.3s;
}

.btn:hover {
  background: #008c44;
}

/* DESTINATIONS */
.section {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.price {
  margin-top: 10px;
  font-weight: 700;
  color: #1e90ff;
}

/* CONTACT */
.contact {
  background: #0b1a5e;
  color: white;
  padding: 50px 20px;
  text-align: center;
}

.contact a {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border-radius: 25px;
  text-decoration: none;
  color: white;
}

.telegram {
  background: #0088cc;
}

.whatsapp {
  background: #25d366;
}

/* TRUST */
.trust {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.trust div {
  font-size: 20px;
  font-weight: 600;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Sogdiana Avia Tour</h1>
  <p>Путешествуйте с комфортом по всему миру</p>
  <a href="https://t.me/SogdianaAviaTourManager" class="btn">Забронировать</a>
</section>

<!-- DESTINATIONS -->
<section class="section">
  <h2>🔥 Топ направления</h2>

  <div class="cards">
    <div class="card">
      <h3>Турция</h3>
      <p class="price">от $450</p>
    </div>

    <div class="card">
      <h3>Египет</h3>
      <p class="price">от $500</p>
    </div>

    <div class="card">
      <h3>Вьетнам</h3>
      <p class="price">от $900</p>
    </div>

    <div class="card">
      <h3>Малайзия</h3>
      <p class="price">от $950</p>
    </div>
  </div>
</section>

<!-- TRUST -->
<section class="section">
  <h2>⭐ Нам доверяют</h2>

  <div class="trust">
    <div>5000+ клиентов</div>
    <div>10+ лет опыта</div>
    <div>24/7 поддержка</div>
  </div>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>📲 Связаться с нами</h2>

  <a href="https://t.me/SogdianaAviaTourManager" class="telegram">Telegram</a>
  <a href="https://wa.me/998917003555" class="whatsapp">WhatsApp</a>
</section>

</body>
</html>
